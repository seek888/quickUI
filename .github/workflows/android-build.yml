name: Android Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.7"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Create demo release keystore
        working-directory: android
        run: |
          keytool -genkeypair \
            -v \
            -keystore app/quickui-demo-release.jks \
            -storetype JKS \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias quickui_demo \
            -storepass quickui123 \
            -keypass quickui123 \
            -dname "CN=QuickUI Demo, OU=Demo, O=QuickUI, L=Shanghai, ST=Shanghai, C=CN"
          cat > key.properties <<'EOF'
          storeFile=app/quickui-demo-release.jks
          storePassword=quickui123
          keyAlias=quickui_demo
          keyPassword=quickui123
          EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: quick-ui-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
